spring:
  application:
    name: life-tracker
  datasource:
    url: jdbc:postgresql://localhost:5432/lifetracker-db
    username: myuser
    password: secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  ai:
    google:
      genai:
        api-key: ${GOOGLE_API_KEY}
        chat:
          options:
            model: gemini-2.5-flash
        embedding:
          options:
            model: gemini-embedding-001
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768
        max-document-batch-size: 10000

  docker:
    compose:
      enabled: false
      lifecycle-management: none